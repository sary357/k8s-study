apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: jupyter
  name: jupyter
  namespace: jupyter
spec:
  replicas: 1
  selector:
    matchLabels:
      run: jupyter
  template:
    metadata:
      labels: 
        run: jupyter
    spec:
      containers:
      - image: jupyter/scipy-notebook:python-3.9.7
        name: jupyter
      dnsPolicy: ClusterFirst
      restartPolicy: Always

